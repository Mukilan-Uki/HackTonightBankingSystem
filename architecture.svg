<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Architecture of the banking system</title>
<desc>Browser sends requests through a Next.js middleware layer, which gates access to app pages; pages call API routes, which go through a shared data layer to a PostgreSQL container, both running under Docker Compose.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="580" fill="#FFFFFF"/>

<g>
<rect x="90" y="20" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="170" y="42" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Browser</text>
</g>
<line x1="170" y1="64" x2="170" y2="213" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="40" y="90" width="600" height="450" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Docker compose stack</text>
</g>

<g>
<rect x="70" y="150" width="380" height="370" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="260" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Next.js app container</text>
<text x="260" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0F6E56">Pages, API routes, data layer</text>
</g>

<g>
<rect x="470" y="150" width="140" height="370" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="540" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#633806">PostgreSQL</text>
<text x="540" y="192" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#854F0B">Storage</text>
</g>

<g>
<rect x="90" y="215" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="170" y="233" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Middleware</text>
<text x="170" y="253" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">Guards page routes</text>
</g>

<g>
<rect x="270" y="215" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="350" y="233" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">App pages</text>
<text x="350" y="253" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">App router screens</text>
</g>

<line x1="250" y1="243" x2="268" y2="243" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="271" x2="350" y2="299" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="90" y="301" width="340" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="260" y="319" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">API routes</text>
<text x="260" y="339" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5F5E5A">Auth-checked endpoints</text>
</g>

<line x1="260" y1="357" x2="260" y2="385" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
